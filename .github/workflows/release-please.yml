name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository == 'danfry1/typediff'
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89f4291f9b58e0500e800 # v4.2.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
